  severity: block
  ng_pattern: '(100%|百パーセント|すべて|全員|全ての方が|みんな)(成功|儲|稼|高く|買取|査定UP)'
  regex: true
  ok_replacement:
    - '多くの方に'
    - '一般的には'
    - '事例としては'
    - '過去の傾向として'
  reason: '景表法 第5条第1号 優良誤認表示（断定・全称表現）'
  applies_to_platform: ['all']
  example_before: '100%高く買取します！全員満足の査定'
  example_after: '多くの方に満足いただける査定を心がけています'

