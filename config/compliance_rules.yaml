- id: CR001
  category: kettoho
  severity: block
  ng_pattern: '^(.*)(確実に|必ず|絶対に)(儲|稼|利益|成功|高く売れ)(.*)$'
  regex: true
  ok_replacement:
    - '傾向として利益が出やすい'
    - '事例として利益が確認されている'
    - '過去の事例では利益が出ることもある（個人差あり）'
  reason: '景表法 第5条第1号 優良誤認表示の禁止（断定的表現）'
  applies_to_platform: ['all']
  example_before: '出張買取は確実に儲かるビジネスです'
  example_after: '出張買取は傾向として利益が出やすいビジネスです（個人差あり）'

