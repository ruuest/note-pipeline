# ==========================================================
# カテゴリ: 古物営業法 (kobutsu) CR016-CR025
# 根拠: 古物営業法 第3条(許可)/第5条(届出)/第12条(標識)/第14条(営業所外取引)
#       第15条(本人確認)/第16条(帳簿)/第18条(不正品申告)
# ==========================================================

- id: CR016
  category: kobutsu
  severity: block
  ng_pattern: '^(?!.*(第?\s*\d{12}\s*号|許可番号|公安委員会)).*?(出張買取|買取(いた)?します|査定(いた)?します)'
  regex: true
  ok_replacement:
    - '古物商許可番号 第XXXXXXXXXXXX号（○○県公安委員会）を明記してください'
    - 'プロフィール/固定ツイートに許可番号を掲載'
    - '投稿内またはbio内に許可番号表示必須'
  reason: '古物営業法 第12条 標識掲示義務（SNS運用でもHP/プロフに番号表示必要）'
  applies_to_platform: ['all']
  example_before: '出張買取します！DMどうぞ'
  example_after: '出張買取します（古物商許可 第123456789012号 東京都公安委員会）DMどうぞ'

- id: CR017
  category: kobutsu
  severity: block
  ng_pattern: '(身分証(明書)?不要|本人確認(なし|不要|ノー)|免許(証)?なく?ても(OK|大丈夫|構いません|買取可))'
  regex: true
  ok_replacement:
    - '本人確認書類をご用意ください（免許証/マイナンバーカード/パスポート等）'
    - '古物営業法に基づく本人確認を実施'
    - '法令遵守のため身分証の提示をお願いしています'
  reason: '古物営業法 第15条第1項 取引相手確認義務（義務免除訴求は違法）'
  applies_to_platform: ['all']
  example_before: '身分証明書不要で簡単買取！'
  example_after: '本人確認書類（免許証/マイナカード等）をご用意ください（法令に基づく義務）'

