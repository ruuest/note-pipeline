    - '未成年の方は保護者同伴・同意書必須'
  reason: '古物営業法 第15条第2項 未成年者買取制限 + 青少年健全育成条例'
  applies_to_platform: ['all']
  example_before: '高校生のゲーム機も高額買取！'
  example_after: '18歳以上の方を対象に買取受付（未成年の方は保護者同伴でご相談ください）'

- id: CR019
  category: kobutsu
  severity: warn
  ng_pattern: '(出張(し|に伺い|で伺|買取))(?!.*(事前(予約|連絡|申請|申告)|届出(済)?|許可制))'
