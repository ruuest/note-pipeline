  example_after: '事前予約制の出張買取（DMにてご連絡ください、古物営業法準拠）'

- id: CR020
  category: kobutsu
  severity: block
  ng_pattern: '(事情(は)?(聞きません|問いません|気にしません)|来歴(問)?(わず|いません)|出所(を)?(問わず|聞かず)|身元(を)?(気にせず))'
